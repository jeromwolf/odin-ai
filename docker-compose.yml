version: '3.8'

services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:15
    container_name: odin-ai-postgres
    environment:
      POSTGRES_DB: odin_ai
      POSTGRES_USER: odin_user
      POSTGRES_PASSWORD: odin_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - odin-network

  # Redis (캐싱 및 큐)
  redis:
    image: redis:7-alpine
    container_name: odin-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - odin-network

  # FastAPI 백엔드
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odin-ai-backend
    environment:
      - DATABASE_URL=postgresql://odin_user:odin_password@postgres:5432/odin_ai
      - REDIS_URL=redis://redis:6379/0
      - PUBLIC_DATA_API_KEY=${PUBLIC_DATA_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HWP_SERVICE_URL=http://hwp-viewer:8002
      - PDF_SERVICE_URL=http://pdf-viewer:8003
      - ENVIRONMENT=development
      - DEBUG=true
    ports:
      - "8123:8000"
    volumes:
      - ./backend:/app/backend
      - ./alembic:/app/alembic
      - ./storage:/app/storage  # 파일 저장소
    depends_on:
      - postgres
      - redis
    networks:
      - odin-network
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # ============= Document Processing Tools =============
  hwp-viewer:
    build:
      context: ./tools/hwp-viewer
      dockerfile: Dockerfile
    container_name: odin-hwp-viewer
    ports:
      - "8002:8002"
    volumes:
      - ./tools/hwp-viewer:/app
      - ./storage/downloads/hwp:/app/uploads
      - ./storage/processed/hwp:/app/processed
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - odin-network
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  pdf-viewer:
    build:
      context: ./tools/pdf-viewer
      dockerfile: Dockerfile
    container_name: odin-pdf-viewer
    ports:
      - "8003:8003"
    volumes:
      - ./tools/pdf-viewer:/app
      - ./storage/downloads/pdf:/app/uploads
      - ./storage/processed/pdf:/app/processed
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - odin-network
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload

  # 문서 처리 워커 (Celery)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odin-ai-worker
    environment:
      - DATABASE_URL=postgresql://odin_user:odin_password@postgres:5432/odin_ai
      - REDIS_URL=redis://redis:6379/0
      - PUBLIC_DATA_API_KEY=${PUBLIC_DATA_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HWP_SERVICE_URL=http://hwp-viewer:8002
      - PDF_SERVICE_URL=http://pdf-viewer:8003
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app/backend
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis
      - hwp-viewer
      - pdf-viewer
    networks:
      - odin-network
    command: ["celery", "-A", "backend.tasks.celery_app", "worker", "--loglevel=info"]

volumes:
  postgres_data:
  redis_data:

networks:
  odin-network:
    driver: bridge