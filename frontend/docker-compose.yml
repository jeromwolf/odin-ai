version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg15
    container_name: odin-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-blockmeta}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-odin2025}
      POSTGRES_DB: ${DB_NAME:-odin_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../sql/search_indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-blockmeta}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: odin-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy lru
    volumes:
      - redis_data:/data
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.backend
    container_name: odin-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-blockmeta}:${DB_PASSWORD:-odin2025}@postgres:5432/${DB_NAME:-odin_db}
      REDIS_URL: redis://redis:6379
      API_KEY: ${API_KEY}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../storage:/app/storage
      - ../logs:/app/logs
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 15s
      timeout: 10s
      start_period: 10s
      retries: 3
    command: uvicorn backend.main:app --host 0.0.0.0 --port 9000 --workers 4

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odin-frontend
    environment:
      REACT_APP_API_URL: http://backend:9000
      REACT_APP_WS_URL: ws://backend:9000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - odin-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: odin-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./build:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - odin-network

  # Batch Processing Worker
  batch-worker:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.backend
    container_name: odin-batch
    environment:
      DATABASE_URL: postgresql://${DB_USER:-blockmeta}:${DB_PASSWORD:-odin2025}@postgres:5432/${DB_NAME:-odin_db}
      REDIS_URL: redis://redis:6379
      API_KEY: ${API_KEY}
      DB_FILE_INIT: ${DB_FILE_INIT:-false}
      TEST_MODE: ${TEST_MODE:-false}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      ENABLE_NOTIFICATION: ${ENABLE_NOTIFICATION:-true}
      ENABLE_DAILY_DIGEST: ${ENABLE_DAILY_DIGEST:-false}
      ENABLE_EMBEDDING: ${ENABLE_EMBEDDING:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../storage:/app/storage
      - ../reports:/app/reports
    networks:
      - odin-network
    command: python batch/production_batch.py

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15-community
    container_name: odin-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-odin2025neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

networks:
  odin-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
